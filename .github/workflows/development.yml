name: development

on:
  push:
    branches:
      - master
      - ci
    tags:
      - '*'
  pull_request:
    branches:
      - '*'

jobs:
  clang-format-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          brew update
          brew install clang-format
      - name: Run clang-format
        run: cd ${GITHUB_WORKSPACE}/ci && sh ./lint.sh && cd ${GITHUB_WORKSPACE}
      - name: Check for changes
        run: |
          if ! git diff --ignore-space-at-eol --exit-code; then
            exit 1
          fi

  cli-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          aqtversion: '==3.3.*'
          version: '5.15.2'
          host: 'linux'
          target: 'desktop'
          archives: 'qttools qtsvg qtimageformats qtbase qtmultimedia icu'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libtbb-dev libgl1-mesa-dev xvfb
      - name: Build application
        run: |
          qmake
          make -j`nproc`
      - name: Run CLI tests
        run: xvfb-run -a ./test/run_tests.sh